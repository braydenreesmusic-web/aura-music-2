# Render Blueprint — auto-deploys when pushed to main
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: aura-music-api
    runtime: node
    repo: https://github.com/braydenreesmusic-web/aura-music-2
    branch: main
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: YTDL_NO_UPDATE
        value: "1"
