# Render Blueprint — auto-deploys when pushed to main
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: aura-music-api
    runtime: docker
    repo: https://github.com/braydenreesmusic-web/aura-music-2
    branch: main
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: YTDL_NO_UPDATE
        value: "1"
      # DB_PATH and DOWNLOAD_DIR are set in Dockerfile defaults
      # Override here only if you add a persistent disk
